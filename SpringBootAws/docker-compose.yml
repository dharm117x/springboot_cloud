services:
  my-database:
    image: mysql:latest
    container_name: mysql-service # Fixed: Added space after colon
    environment: # Added: MySQL requires an environment variable to initialize
      - MYSQL_ROOT_PASSWORD=admin
      - MYSQL_DATABASE=aws_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql # This persists your data
    healthcheck: # Added: Prevents app from starting before DB is ready
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  my-app:
    image: dharm117docker/springboot-aws:1.2
    container_name: my-boot-app
    privileged: true
    volumes:
      - "/home/dharmendra/apps:/app/logs"
    ports:
      - "9001:9001"
    environment:
      - SNS_TOPIC_ARN=arn:aws:sns:us-east-1:ACC_NO:my-topic
      - SPRING_CLOUD_AWS_REGION_STATIC=us-east-1
      - SPRING_PROFILES_ACTIVE=dev
      - LOGGING_FILE_NAME=/app/logs/app.log
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-service:3306/aws_db
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=admin
    depends_on:
      my-database:
        condition: service_healthy # Fixed: Ensures app waits for DB readiness
    restart: unless-stopped
volumes:
  mysql_data: # Defines the named volume