<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>S3 File Manager</title>
    <style>
        table { width: 50%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
        .section { margin-bottom: 20px; padding: 10px; border: 1px solid #eee; }
    </style>
</head>
<body>

    <div class="section">
        <h2>S3 Operations</h2>
        <div th:if="${message}" th:text="${message}" style="color: green;"></div>

        <!-- 1. Selection & Upload Form -->
        <form method="POST" th:action="@{/s3/upload}" enctype="multipart/form-data">
            <label>Select Bucket:</label>
            <select name="bucketName" required>
                <option value="" disabled selected>-- Choose Bucket --</option>
                <!-- Iterates over list of buckets from Controller -->
                <option th:each="b : ${buckets}" th:value="${b}" th:text="${b}"></option>
            </select>
            <input type="file" name="file" required />
            <button type="submit">Upload</button>
        </form>
    </div>

    <hr/>

    <div class="section">
        <!-- 2. Refresh List for a Specific Bucket -->
        <form th:action="@{/s3/files}" method="GET">
            <label>View Files in:</label>
            <select name="bucketName" onchange="this.form.submit()">
                <option value="" disabled selected>-- Choose Bucket to View --</option>
                <option th:each="b : ${buckets}" th:value="${b}" th:text="${b}" 
                        th:selected="${b == selectedBucket}"></option>
            </select>
            <button type="submit">Refresh List</button>
        </form>

        <h2 th:if="${selectedBucket}">Files in: <span th:text="${selectedBucket}"></span></h2>
        
        <table>
            <thead>
                <tr>
                    <th>File Name</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="fileName : ${files}">
                    <td th:text="${fileName}"></td>
                    <td>
                        <!-- Download link includes bucketName so controller knows where to look -->
                        <a th:href="@{/s3/download(bucketName=${selectedBucket}, fileName=${fileName})}">Download</a>
                   		
                   		| 
                
		                <!-- Delete link with confirmation -->
		                <a th:href="@{/s3/delete(bucketName=${selectedBucket}, fileName=${fileName})}" 
		                   style="color: red;"
		                   onclick="return confirm('Are you sure you want to delete this file?')">Delete</a>
		                        
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(files)}">
                    <td colspan="2">No files found or no bucket selected.</td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
