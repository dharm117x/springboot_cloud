<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
    <h2>Upload File to S3</h2>
    <div th:if="${message}" th:text="${message}" style="color: green;"></div>
    
    <form method="POST" th:action="@{/s3/upload}" enctype="multipart/form-data">
        <input type="file" name="file" required />
        <button type="submit">Upload</button>
    </form>

    <hr/>
    <h2>Download File</h2>
    <form method="GET" th:action="@{/s3/download}">
        <input type="text" name="fileName" placeholder="Enter file name" required />
        <button type="submit">Download</button>
    </form>
</body>
</html>
