name: SpringBoot Docker CI/CD

on:
  push:
    branches: [ "master" ]
    paths:
      - 'SpringBootDocker/**'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: SpringBootDocker

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Build JAR
      run: mvn clean package -DskipTests

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build Docker Image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/springbootdocker:latest .

    - name: Push Docker Image
      run: docker push ${{ secrets.DOCKER_USERNAME }}/springbootdocker:latest